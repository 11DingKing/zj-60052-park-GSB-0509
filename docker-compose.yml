version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: park-backend
    ports:
      - "13052:3000"
    environment:
      - DATABASE_URL=postgresql://dev:dev123456@host.docker.internal:5432/db_zj_60052
      - REDIS_URL=redis://default:redis123456@host.docker.internal:6379
      - JWT_SECRET=parking-jwt-secret-key-2024
      - PORT=3000
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
      - ./backend/package.json:/app/package.json
      - ./backend/tsconfig.json:/app/tsconfig.json
      - ./backend/nest-cli.json:/app/nest-cli.json
      - /app/node_modules
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - park-network
    command: sh -c "npx prisma db push && (npm run prisma:seed || true) && npm run start:dev"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: park-frontend
    ports:
      - "16052:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:13052
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/package.json:/app/package.json
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/index.html:/app/index.html
      - /app/node_modules
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - park-network
    command: npm run dev -- --host 0.0.0.0

networks:
  park-network:
    driver: bridge
